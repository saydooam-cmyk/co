<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKINA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Moirai+One&family=Lalezar&display=swap" rel="stylesheet">
<style>
  :root {
    --cow-w: 160px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #fff6d5 0%, #ffe9a8 20%, #cdeefb 65%, #a9dcf5 100%);
    cursor: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Custom circular cursor ---------- */
  #cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 26px;
    height: 26px;
    margin-left: -13px;
    margin-top: -13px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    border: 2px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 2px 10px rgba(60, 50, 20, 0.25);
    pointer-events: none;
    z-index: 10;
    will-change: transform;
  }

  /* ---------- Tiled "SAKINA" text background ---------- */
  .text-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vmax;
    height: 65vmax;
    transform: translate(-50%, -50%) rotate(-28deg);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    place-items: center;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  .text-bg span {
    font-family: 'Moirai One', system-ui, sans-serif;
    font-size: 100px;
    line-height: 1;
    white-space: nowrap;
    padding: 18px 34px;
    color: rgba(255, 255, 255, 0.35);
    -webkit-text-stroke: 1px rgba(255, 200, 90, 0.80);
    letter-spacing: 2px;
    opacity: 0;
    animation-name: sakinaPulse;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }

  @keyframes sakinaPulse {
    0%, 100% { opacity: 0; }
    50%      { opacity: 1; }
  }

  /* subtle vignette so the tiled text doesn't fight for attention */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 55%, rgba(190,225,240,0.35) 100%);
  }

  /* ---------- Cow ---------- */
  #cow {
    position: fixed;
    top: 0;
    left: 0;
    width: var(--cow-w);
    height: auto;
    z-index: 5;
    pointer-events: none;
    will-change: transform;
    filter: drop-shadow(0 14px 18px rgba(60, 50, 20, 0.25));
  }

  /* idle float is handled in JS (added directly into the position transform)
     so it never fights with the cow's tracked x/y position */

  /* ---------- Center "write" button ---------- */
  #openBtn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    padding: 18px 40px;
    font-family: 'Lalezar', system-ui, sans-serif;
    font-size: 24px;
    letter-spacing: 0.5px;
    direction: rtl;
    color: #6b4f1d;
    background: rgba(255, 255, 255, 0.45);
    border: 1.5px solid rgba(255, 255, 255, 0.8);
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(120, 100, 40, 0.18), inset 0 1px 0 rgba(255,255,255,0.6);
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    animation: pulseGlow 3.2s ease-in-out infinite;
  }

  #openBtn:hover {
    transform: translate(-50%, -50%) scale(1.06);
    background: rgba(255, 255, 255, 0.65);
    box-shadow: 0 10px 30px rgba(120, 100, 40, 0.28), inset 0 1px 0 rgba(255,255,255,0.8);
  }

  #openBtn:active {
    transform: translate(-50%, -50%) scale(0.97);
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 8px 24px rgba(120, 100, 40, 0.18), inset 0 1px 0 rgba(255,255,255,0.6); }
    50%      { box-shadow: 0 8px 34px rgba(255, 210, 120, 0.5), inset 0 1px 0 rgba(255,255,255,0.8); }
  }

  /* ---------- Write panel ---------- */
  #modalBackdrop {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(60, 80, 90, 0.25);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  #modalBackdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  #modalCard {
    width: min(90vw, 460px);
    background: linear-gradient(160deg, rgba(255,255,255,0.9), rgba(255, 248, 225, 0.85));
    border: 1.5px solid rgba(255,255,255,0.9);
    border-radius: 22px;
    padding: 28px 26px 22px;
    box-shadow: 0 24px 60px rgba(60, 50, 20, 0.3);
    transform: scale(0.85) translateY(10px);
    opacity: 0;
    transition: transform 0.3s cubic-bezier(.2,.9,.3,1.3), opacity 0.3s ease;
    direction: rtl;
  }

  #modalBackdrop.open #modalCard {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  #modalCard h2 {
    font-family: 'Lalezar', system-ui, sans-serif;
    font-size: 30px;
    font-weight: normal;
    color: #6b4f1d;
    margin-bottom: 14px;
    text-align: center;
  }

  #modalText {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    padding: 14px;
    font-family: 'Lalezar', system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.6;
    color: #4a3d1d;
    background: rgba(255, 255, 255, 0.7);
    border: 1.5px solid rgba(200, 170, 100, 0.4);
    border-radius: 14px;
    outline: none;
    text-align: right;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  #modalText:focus {
    border-color: rgba(255, 190, 90, 0.9);
    box-shadow: 0 0 0 4px rgba(255, 210, 130, 0.25);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
  }

  .modal-actions button {
    font-family: 'Lalezar', system-ui, sans-serif;
    font-size: 17px;
    font-weight: normal;
    padding: 10px 22px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #cancelBtn {
    background: rgba(230, 225, 210, 0.8);
    color: #6b5a2e;
  }

  .modal-actions button:hover {
    transform: translateY(-2px);
  }

  #cow.missing {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 140px;
    height: 100px;
    background: rgba(255,255,255,0.85);
    border: 2px dashed rgba(120,90,40,0.5);
    border-radius: 14px;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    color: #6b5a2e;
    text-align: center;
    padding: 6px;
  }
</style>
</head>
<body>

  <div class="text-bg" id="textBg"></div>
  <div class="overlay"></div>

  <img id="cow" src="cow.png" alt="cow">
  <div id="cursor"></div>

  <button id="openBtn" style='display:none;'>عجزت اصيدها 🐄</button>

  <div id="modalBackdrop">
    <div id="modalCard">
      <h2>وش رايك في اللعبة؟</h2>
      <textarea id="modalText" placeholder="اكتب رأيك هنا... (يتحفظ تلقائيًا وانت تكتب)"></textarea>
      <div class="modal-actions">
        <button id="cancelBtn">تم</button>
      </div>
    </div>
  </div>

<script>
  // ---------- Build the tiled SAKINA background ----------
  const textBg = document.getElementById('textBg');
  const COPIES = 16; // matches the 4x4 grid above
  const frag = document.createDocumentFragment();
  for (let i = 0; i < COPIES; i++) {
    const span = document.createElement('span');
    span.textContent = 'SAKINA';
    // stagger each copy so the fades ripple organically instead of blinking together
    const duration = (2.5 + Math.random() * 3).toFixed(2);   // 2.5s - 5.5s
    const delay = (Math.random() * 5).toFixed(2);            // 0s - 5s
    span.style.animationDuration = duration + 's';
    span.style.animationDelay = '-' + delay + 's';
    frag.appendChild(span);
  }
  textBg.appendChild(frag);

  // ---------- Cow chase / follow / escape behaviour ----------
  const cow = document.getElementById('cow');

  // handle missing image gracefully
  cow.addEventListener('error', () => {
    cow.classList.add('missing');
    cow.removeAttribute('src');
    cow.alt = '';
    cow.innerHTML = 'Place a "cow.png" file next to this HTML file';
  });

  let cowW = 160, cowH = 120;
  cow.addEventListener('load', () => {
    cowW = cow.offsetWidth;
    cowH = cow.offsetHeight;
  });

  // raw mouse position (target)
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  // smoothed cursor circle position
  let cursorX = mouseX;
  let cursorY = mouseY;

  // cow position (top-left corner of the image)
  let cowX = window.innerWidth / 2 - cowW / 2;
  let cowY = window.innerHeight / 2 - cowH / 2;

  // where the cow "parks" once the mouse goes idle, so it holds still there
  let restX = cowX, restY = cowY;

  let facing = 1; // 1 = right, -1 = left
  let lastMoveTime = Date.now();
  let lastMouseX = mouseX;
  let wasIdle = true;

  const cursorEl = document.getElementById('cursor');

  const ESCAPE_DIST   = 200;   // if the mouse gets this close, the cow bolts
  const KEEP_DIST     = 230;   // preferred distance the cow likes to keep while "following"
  const IDLE_MS       = 400;   // no mouse movement for this long -> settle and float in place
  const FLOAT_AMP     = 10;    // px of idle bobbing
  const FLOAT_SPEED   = 0.0010;// idle bob speed

  // rates expressed as "% closed per second" then converted per-frame using dt,
  // so motion speed no longer depends on the browser's frame rate
  const CURSOR_RATE = 200;  // cursor catch-up rate
  const FOLLOW_RATE = 10;   // cow catch-up rate while following
  const ESCAPE_RATE = 9;    // cow catch-up rate while escaping (faster = more panicked)

  function smoothing(rate, dt) {
    return 1 - Math.exp(-rate * dt);
  }

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    lastMoveTime = Date.now();
  });

  let lastTime = performance.now();

  function tick(now) {
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.05); // avoid big jumps after a tab is backgrounded

    const idle = Date.now() - lastMoveTime > IDLE_MS;

    // ---- smooth custom cursor ----
    const ck = smoothing(CURSOR_RATE, dt);
    cursorX += (mouseX - cursorX) * ck;
    cursorY += (mouseY - cursorY) * ck;
    cursorEl.style.transform = `translate(${cursorX}px, ${cursorY}px)`;

    // ---- cow motion ----
    if (!idle) {
      const cowCenterX = cowX + cowW / 2;
      const cowCenterY = cowY + cowH / 2;

      const dx = mouseX - cowCenterX;
      const dy = mouseY - cowCenterY;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      let targetX = cowX;
      let targetY = cowY;
      let rate = 0;

      if (dist < ESCAPE_DIST) {
        // Escape: aim for a spot just beyond the safe distance, away from the mouse
        const pushBy = (ESCAPE_DIST - dist) + 60;
        targetX = cowX - (dx / dist) * pushBy;
        targetY = cowY - (dy / dist) * pushBy;
        rate = ESCAPE_RATE;
      } else if (dist > KEEP_DIST) {
        // Follow: head toward a point near the mouse, keeping some distance
        targetX = mouseX - (dx / dist) * KEEP_DIST - cowW / 2;
        targetY = mouseY - (dy / dist) * KEEP_DIST - cowH / 2;
        rate = FOLLOW_RATE;
      }

      if (rate > 0) {
        const k = smoothing(rate, dt);
        cowX += (targetX - cowX) * k;
        cowY += (targetY - cowY) * k;
      }

      // facing direction based on the mouse's horizontal travel
      if (mouseX - lastMouseX > 1) facing = -1;
      else if (mouseX - lastMouseX < -1) facing = 1;
      lastMouseX = mouseX;

      restX = cowX;
      restY = cowY;
      wasIdle = false;
    } else if (!wasIdle) {
      // just went idle: lock in the spot the cow is currently at
      restX = cowX;
      restY = cowY;
      wasIdle = true;
    }

    // keep the cow on-screen
    cowX = Math.max(-cowW * 0.2, Math.min(window.innerWidth - cowW * 0.8, cowX));
    cowY = Math.max(-cowH * 0.2, Math.min(window.innerHeight - cowH * 0.8, cowY));
    restX = Math.max(-cowW * 0.2, Math.min(window.innerWidth - cowW * 0.8, restX));
    restY = Math.max(-cowH * 0.2, Math.min(window.innerHeight - cowH * 0.8, restY));

    // idle float bob is added on top of the resting position, never replaces it
    const floatY = idle ? Math.sin(now * FLOAT_SPEED) * FLOAT_AMP : 0;
    const drawX = idle ? restX : cowX;
    const drawY = (idle ? restY : cowY) + floatY;

    cow.style.transform = `translate(${drawX}px, ${drawY}px) scaleX(${facing})`;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  window.addEventListener('resize', () => {
    cowX = Math.min(cowX, window.innerWidth - cowW);
    cowY = Math.min(cowY, window.innerHeight - cowH);
  });

  // ---------- Write panel + auto-save while typing ----------
  const openBtn = document.getElementById('openBtn');
  const backdrop = document.getElementById('modalBackdrop');
  const modalText = document.getElementById('modalText');
  const cancelBtn = document.getElementById('cancelBtn');

  function openModal() {
    modalText.value = '';
    lastSavedValue = '';
    backdrop.classList.add('open');
    setTimeout(() => modalText.focus(), 200);
  }

  function closeModal() {
    flushSave();          // make sure the very last keystrokes are captured
    backdrop.classList.remove('open');
  }

  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);

  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal();
  });

  // Local backup: every saved line also goes into localStorage, so nothing
  // is lost even if the person never grants file-write permission.
  function backupLocally(entry) {
    const key = 'sakinaFeedback';
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.push(entry);
    localStorage.setItem(key, JSON.stringify(list));
  }

  // The file handle is requested once per visit (native "choose a file"
  // dialog, not a download), then reused silently for every later write.
  // Point it at save.txt inside your project folder when the dialog opens.
  let fileHandle = null;
  const supportsFS = 'showSaveFilePicker' in window;

  async function ensureFileHandle() {
    if (fileHandle) return fileHandle;
    fileHandle = await window.showSaveFilePicker({
      suggestedName: 'save.txt',
      types: [{ description: 'Text file', accept: { 'text/plain': ['.txt'] } }]
    });
    return fileHandle;
  }

  async function appendToFile(handle, line) {
    let existing = '';
    try {
      const file = await handle.getFile();
      existing = await file.text();
    } catch (e) { /* file may be empty/new */ }
    const writable = await handle.createWritable();
    await writable.write(existing + (existing && !existing.endsWith('\n') ? '\n' : '') + line + '\n');
    await writable.close();
  }

  function writeEntry(text) {
    const stamp = new Date().toLocaleString('ar-SA');
    const entry = `[${stamp}] ${text}`;
    backupLocally(entry);
    if (supportsFS) {
      ensureFileHandle()
        .then((handle) => appendToFile(handle, entry))
        .catch(() => { /* picker closed / permission denied: local backup already has it */ });
    }
  }

  // ---- typing tracker: saves 300ms after the person stops typing ----
  // if they keep typing afterwards, only the newly added text is saved
  // as its own line, instead of re-saving everything from the start.
  let lastSavedValue = '';
  let debounceTimer = null;

  function diffNewPart(current, previous) {
    if (current === previous) return '';
    if (current.startsWith(previous)) return current.slice(previous.length);
    // text was edited/deleted rather than simply extended: save it as a fresh line
    return current;
  }

  function flushSave() {
    clearTimeout(debounceTimer);
    const current = modalText.value;
    const newPart = diffNewPart(current, lastSavedValue).trim();
    if (newPart) writeEntry(newPart);
    lastSavedValue = current;
  }

  modalText.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(flushSave, 300);
  });
</script>

</body>
</html>
